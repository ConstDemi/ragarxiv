version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  rag:
    # build: .
    image: constdemi/ragarxiv:latest
    container_name: rag_app
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - ./qdrant.snapshot:/data/qdrant.snapshot:ro
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qdrant_data:
